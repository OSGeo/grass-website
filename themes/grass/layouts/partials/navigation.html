<nav class="navbar navbar-expand-lg bg-body-light navbar-dark">
    <div class="container-fluid">
    <a class="navbar-brand" href="{{.Site.BaseURL}}">
        <img class="grass-icon" title="GRASS" alt="GRASS logo in white variant without text" src="{{.Site.BaseURL}}images/logos/grass-logo-simple/grass-white-no-text.svg">
        <span class="grass text-white">{{.Site.Params.logo}}</span>
    </a>
    <button
        aria-controls="navigation"
        aria-expanded="false"
        aria-label="Toggle navigation"
        class="navbar-toggler border-0"
        data-bs-target="#navigation"
        data-bs-toggle="collapse"
        type="button">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse text-center" id="navigation">
        <ul class="navbar-nav">
            {{ range .Site.Menus.main }}
            {{- if .HasChildren }}
            <li class="nav-item dropdown">
                <a
                    aria-expanded="false"
                    aria-haspopup="true"
                    class="nav-link dropdown-toggle text-light"
                    data-bs-toggle="dropdown"
                    href="{{.URL}}"
                    id="dropdown-{{ .Name | urlize }}"
                    role="button">{{ .Name }}
                </a>
                <div class="dropdown-menu" aria-labelledby="dropdown-{{ .Name | urlize }}">
                    {{ range .Children }}
                    <a class="dropdown-item" href="{{.URL}}">{{.Name}}</a>
                    {{ end }}
                </div>
            </li>
            {{- else }}
            <li class="nav-item"><a class="nav-link text-light" href="{{.URL}}">{{ .Name }}</a></li>
            {{- end }}
            {{ end }}
        </ul>

    </div>
    </div>
</nav>
