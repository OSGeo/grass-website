<script>
    document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById("{{ .id }}");
        if (!btn || !btn.previousElementSibling) return;
        btn.addEventListener('click', function () {
            navigator.clipboard.writeText(btn.previousElementSibling.textContent).catch(function (err) {
                console.error('Error in copying text: ', err);
            });
        });
    });
</script>

<div>
    <h3>{{ .title }}</h3>
    <div class="code-container m-3 rounded">
        <pre><code class="language-sh">{{ .code }}</code></pre>
        <button id="{{ .id }}" class="btn btn-primary btn-clipboard">Copy</button>
    </div>
</div>
