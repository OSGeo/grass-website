{{ partial "head.html" . }}


{{ "<!-- navigation -->" | safeHTML }}
<header class="shadow-bottom position-relative bg-primary">
  <div class="container bg-primary">
    {{ partial "navigation.html" . }}
  </div>
</header>
{{ "<!-- /navigation -->" | safeHTML }}


<!-- page title -->
<section>
  <section class="pt-4 bg-gray">
    <div class="container">
      <div class="row">
        <div class="col-12 text-center">
          <h1 class="page-title grass-green">{{ .Title }}</h1>
        </div>
      </div>
    </div>
  </section>
</section>

<!-- details page -->
<section class="single section bg-gray pb-0">
  <div class="container">
    <div class="row">
      <div class="col-lg-10">
        <div class="map" id="map"></div>
        <div id="popup" class="ol-popup">
          <a href="#" id="popup-closer" class="ol-popup-closer"></a>
          <div id="popup-content"></div>
        </div>
      </div>

      <div class="col-lg-2 col-sm-6 mb-4">
        <h3>Layer Manager</h3>
        <input type='radio' name='layers' value='user' checked>Users</input><br>
        <input type='radio' name='layers' value='provider'>Provider</input><br>
        {{ .Content }}
      </div>
    </div>
</section>

{{ partial "footer.html" . }}
