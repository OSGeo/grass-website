services:
  build:
    # Renovate manages this image tag; keep it in sync with
    # .devcontainer/devcontainer.json and .github/workflows/.
    image: hugomods/hugo:0.113.0
    environment:
      - HUGO_ENVIRONMENT=production
      - HUGO_ENV=production
      - HUGO_EXTENDED=true
    working_dir: /src
    # The Node.js version comes from .nvmrc (single source, Renovate-managed).
    command: >-
      sh -c "apk add --no-cache nodejs npm curl bash
      && npm install -g n
      && n \"$$(cat .nvmrc)\"
      && node -v
      && npm ci
      && hugo --minify --baseURL \"http://localhost:8080/\"
      && chmod -R a+rX public"
    volumes:
      - ./:/src
      - ~/hugo_cache:/tmp/hugo_cache

  nginx:
    image: nginx:1.18.0
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      build:
        condition: service_completed_successfully
    ports:
      - 8080:80
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
